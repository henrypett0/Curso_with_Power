<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Lección - {{ filename }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2.5rem;
            max-width: 900px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a1a;
        }
        .filename {
            font-size: 0.85rem;
            color: #6b7280;
            background: #f3f4f6;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        textarea {
            width: 100%;
            min-height: 500px;
            padding: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            resize: vertical;
            margin-bottom: 1.5rem;
            background: #fafafa;
            tab-size: 2;
        }
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .actions {
            display: flex;
            gap: 1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #16a34a;
            color: white;
            flex: 1;
        }
        .btn-primary:hover { background: #15803d; }
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        .btn-secondary:hover { background: #d1d5db; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Editar Lección</h1>
            <span class="filename">{{ filename }}</span>
        </div>
        <p class="subtitle">Revisa y edita el contenido generado antes de publicar.</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form action="/publish" method="post" id="publishForm">
            <input type="hidden" name="lesson_number" value="{{ lesson_number }}">
            <textarea name="qmd_content" id="editor">{{ qmd_content }}</textarea>
            <div class="actions">
                <a href="/" class="btn btn-secondary">Volver</a>
                <button type="submit" class="btn btn-primary" id="publishBtn">Publicar Lección</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('publishForm').addEventListener('submit', function() {
            document.getElementById('publishBtn').disabled = true;
            document.getElementById('publishBtn').textContent = 'Publicando...';
        });

        // Allow Tab key in textarea
        document.getElementById('editor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                var start = this.selectionStart;
                var end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 2;
            }
        });
    </script>
</body>
</html>
