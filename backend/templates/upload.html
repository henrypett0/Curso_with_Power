<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Lecciones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .alert-error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }
        .alert-success a {
            color: #15803d;
            font-weight: 600;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #374151;
        }
        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        input[type="file"]:hover {
            border-color: #9ca3af;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }
        .spinner {
            display: none;
            text-align: center;
            color: #666;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Generador de Lecciones</h1>
        <p class="subtitle">Sube un PDF para generar una lección en formato .qmd</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">
            {{ success }}
            {% if file_url %}
            <br><a href="{{ file_url }}" target="_blank">Ver en GitHub</a>
            {% endif %}
        </div>
        {% endif %}

        <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">
            <label for="file">Archivo PDF</label>
            <input type="file" id="file" name="file" accept=".pdf" required>
            <button type="submit" id="submitBtn">Generar Lección</button>
        </form>
        <div class="spinner" id="spinner">Procesando PDF con Claude... esto puede tomar unos segundos.</div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function() {
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Procesando...';
            document.getElementById('spinner').style.display = 'block';
        });
    </script>
</body>
</html>
